services:
  postgres:
    image: postgres:16-alpine
    container_name: paperscout-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperscout
      POSTGRES_PASSWORD: paperscout
      POSTGRES_DB: paperscout
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U paperscout -d paperscout']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
