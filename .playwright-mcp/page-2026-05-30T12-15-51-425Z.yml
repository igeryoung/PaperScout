            - heading "排序註記" [level=2] [ref=e69]
            - paragraph [ref=e70]: 本次運行排名第一 ── 在問題定義上具明確新穎性，刻意納入 absent-persona 控制條件，並提出可信的 agentic baseline。場域為 arXiv，可信度分數維持中等；Grauman 團隊的歷史紀錄則拉高作者聲譽分數。
          - group [ref=e72]:
            - generic "原始摘要 收合" [ref=e73] [cursor=pointer]:
              - heading "原始摘要" [level=2] [ref=e74]
              - generic [ref=e75]: 收合
            - paragraph [ref=e76]: "As wearable devices like smart glasses integrate Large Multimodal Models (LMMs) into the continuous first-person visual streams of individual users, the evolution of these models into true personal assistants hinges on visual personalization: the ability to reason over visual information unique to the wearer. We formalize this capability as Personal Visual Context Learning (Personal VCL), the prompt-time capability of using user-specific visual context to resolve personalized queries. To systematically evaluate this, we present Personal-VCL-Bench, a comprehensive benchmark capturing the personal visual world across persons, objects, and behaviors. Our analysis of frontier LMMs identifies a profound context utilization gap, revealing that the mechanisms for leveraging visual evidence, as well as aggregating multiple visual observations, remain critically understudied. Motivated by these findings, we propose the Agentic Context Bank, a strong inference-time baseline that structures a user's visual context into a self-refining memory bank and employs query-adaptive evidence selection. Our baseline approach consistently improves over standard context prompting regimes across tasks and evaluated backbones, demonstrating a practical path towards future personalized LMMs."
